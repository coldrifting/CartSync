name: Build and deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Build Backend API
        run: dotnet build --configuration Release
        working-directory: API/CartSync
        
      - name: Publish Backend API
        run: dotnet publish --configuration Release --output ../../build
        working-directory: API/CartSync

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
        
      - name: Install Node Packages
        run: npm ci
        working-directory: Frontend
        
      - name: Build and Publish Frontend
        run: npm run build
        working-directory: Frontend
        
      - name: Stop Server and remove old files
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: root
          key: ${{ secrets.KEY }}
          port: ${{ secrets.PORT }}
          script: |
            systemctl stop cartsync.service
            rm /usr/local/bin/cartsync || true
            rm -r /var/www/cartsync || true

      - name: Deploy Server Executable to VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: root
          key: ${{ secrets.KEY }}
          port: ${{ secrets.PORT }}
          source: "build/cartsync"
          target: /usr/local/bin
          strip_components: 1

      - name: Deploy Static files to VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          port: ${{ secrets.PORT }}
          source: "Frontend/build/cartsync"
          target: /var/www
          strip_components: 2

      - name: Restart Server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: root
          key: ${{ secrets.KEY }}
          port: ${{ secrets.PORT }}
          script: systemctl restart cartsync.service