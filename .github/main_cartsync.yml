name: Build and deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v6
        path: cartsync

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Build and Publish Frontend
        run: npm run build --prefix cartsync/Frontend

      - name: Build Backend API
        run: dotnet build cartsync/API/CartSync.csproj --configuration Release

      - name: Publish Backend API
        run: dotnet publish cartsync/API/CartSync.csproj --configuration Release --output output/cartsync

      - name: Clear server files
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          port: ${{ secrets.PORT }}
          script: |
            rm -r /var/www/wwwroot
            rm /var/www/appsettings.json
            rm /var/www/cartsync

      - name: Deploy to VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          port: ${{ secrets.PORT }}
          source: output/cartsync/cartsync,output/cartsync/appsettings.json,output/cartsync/wwwroot
          target: /var/www/

      - name: Restart Server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          port: ${{ secrets.PORT }}
          script: systemctl --user restart cartsync.service